name: RuboCop

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Ruby and Bundle Install
        uses: ruby/setup-ruby@v1

        with:
          bundler-cache: true
          ruby-version-file: .ruby-version

      - name: RuboCop
        run: bundle exec rubocop --parallel
